name: Tests Django

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: test_devis_factures_db
          POSTGRES_USER: django_user_admin
          POSTGRES_PASSWORD: qwerty12345
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_HOST: localhost
      DATABASE_PORT: 5432
      DATABASE_NAME: test_devis_factures_db
      DATABASE_USER: django_user_admin
      DATABASE_PASSWORD: qwerty12345

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache des dépendances pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Vérifier que les migrations sont à jour
        run: python manage.py makemigrations --check --dry-run
        env:
          DATABASE_HOST: localhost

      - name: Appliquer les migrations
        run: python manage.py migrate --verbosity=0
        env:
          DATABASE_HOST: localhost

      - name: Lancer les tests
        run: python manage.py test --verbosity=2
        env:
          DATABASE_HOST: localhost