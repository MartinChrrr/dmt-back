name: CI — Backend

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: devis_factures_db
          POSTGRES_USER: django_user_admin
          POSTGRES_PASSWORD: qwerty12345
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U django_user_admin -d devis_factures_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      SECRET_KEY: ci-secret-key-not-used-in-prod
      DEBUG: "1"
      DATABASE_HOST: localhost
      DATABASE_PORT: "5432"
      DATABASE_NAME: devis_factures_db
      DATABASE_USER: django_user_admin
      DATABASE_PASSWORD: qwerty12345

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies (WeasyPrint)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 libffi-dev \
            libcairo2 libglib2.0-0

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate --no-input

      - name: Run tests
        run: python manage.py test --verbosity=2
