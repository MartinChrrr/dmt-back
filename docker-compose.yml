services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: devis_factures_db
      POSTGRES_USER: django_user_admin
      POSTGRES_PASSWORD: qwerty12345
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U django_user_admin -d devis_factures_db"]
      interval: 2s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    ports:
      - "8083:8080"
    depends_on:
      - db

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8001:8000"
    environment:
      - DEBUG=1
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: